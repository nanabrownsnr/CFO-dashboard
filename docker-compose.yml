services:
  api:
    build: .
    command: npm run api
    env_file:
      - .env.local
    ports:
      - "8787:8787"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build: .
    command: npm run dev -- --host 0.0.0.0 --port 5173
    env_file:
      - .env.local
    environment:
      VITE_API_PROXY_TARGET: http://api:8787
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  api_node_modules:
  web_node_modules:
